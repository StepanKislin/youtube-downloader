<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TubeFlow Pro - Загрузчик видео</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --bg-dark: #0f172a;
            --bg-card: rgba(30, 41, 59, 0.8);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            position: relative;
            overflow-x: hidden;
        }

        /* Анимированный фон */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: 
                radial-gradient(circle at 20% 80%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(236, 72, 153, 0.15) 0%, transparent 50%);
        }

        .floating-shapes {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            filter: blur(100px);
            opacity: 0.3;
            animation: float 20s infinite ease-in-out;
        }

        .shape:nth-child(1) {
            width: 500px;
            height: 500px;
            background: var(--primary);
            top: -200px;
            left: -100px;
        }

        .shape:nth-child(2) {
            width: 400px;
            height: 400px;
            background: var(--secondary);
            bottom: -200px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: pulse 2s infinite;
            -webkit-text-fill-color: white;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            50% { box-shadow: 0 0 30px 10px rgba(99, 102, 241, 0.2); }
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .main-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .input-section {
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .url-input {
            flex: 1;
            padding: 18px 25px;
            font-size: 1.1rem;
            border: 2px solid var(--border);
            border-radius: 16px;
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-primary);
            transition: all 0.3s ease;
            outline: none;
        }

        .url-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .url-input::placeholder {
            color: var(--text-secondary);
        }

        .btn {
            padding: 18px 32px;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px var(--primary);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border);
            padding-bottom: 10px;
        }

        .tab {
            padding: 10px 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1rem;
            position: relative;
            transition: color 0.3s;
        }

        .tab.active {
            color: var(--primary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            border-radius: 2px;
        }

        .video-info {
            display: none;
            animation: fadeIn 0.5s;
        }

        .video-info.show {
            display: block;
        }

        .video-header {
            display: flex;
            gap: 25px;
            margin-bottom: 30px;
            background: rgba(15, 23, 42, 0.5);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid var(--border);
        }

        .thumbnail-container {
            position: relative;
            flex-shrink: 0;
        }

        .thumbnail {
            width: 320px;
            height: 180px;
            object-fit: cover;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .duration-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .video-details {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .video-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.3;
        }

        .video-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 15px;
        }

        .video-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .video-description {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .format-section {
            margin-bottom: 25px;
        }

        .section-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        .format-btn {
            padding: 16px 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .format-btn:hover {
            background: rgba(99, 102, 241, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .format-btn.selected {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-color: transparent;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }

        .format-quality {
            font-weight: 700;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 4px;
        }

        .format-info {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .format-size {
            font-size: 0.75rem;
            opacity: 0.6;
            margin-top: 4px;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        .btn-full {
            flex: 1;
            justify-content: center;
            padding: 20px;
            font-size: 1.1rem;
        }

        .download-progress {
            display: none;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 20px;
            padding: 30px;
            border: 1px solid var(--border);
            margin-top: 20px;
        }

        .download-progress.show {
            display: block;
            animation: slideIn 0.5s;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .progress-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .progress-percent {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-bar-container {
            height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 6px;
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            text-align: center;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .success-card {
            display: none;
            text-align: center;
            padding: 40px;
            background: rgba(16, 185, 129, 0.1);
            border: 2px solid var(--success);
            border-radius: 20px;
            animation: scaleIn 0.5s;
        }

        .success-card.show {
            display: block;
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            font-size: 3rem;
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.3);
            animation: bounceIn 0.6s;
        }

        @keyframes bounceIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .success-title {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .success-filename {
            color: var(--text-secondary);
            margin-bottom: 25px;
            word-break: break-all;
            padding: 0 20px;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: white;
            padding: 18px 40px;
            font-size: 1.1rem;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px -10px var(--success);
        }

        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 20px;
            border-radius: 12px;
            margin-top: 20px;
            animation: shake 0.5s;
        }

        .error-message.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .playlist-info {
            display: none;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid var(--warning);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .playlist-info.show {
            display: block;
            animation: fadeIn 0.5s;
        }

        .playlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .playlist-title {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .playlist-count {
            background: var(--warning);
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .playlist-videos {
            max-height: 400px;
            overflow-y: auto;
        }

        .playlist-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            margin-bottom: 10px;
            transition: background 0.2s;
        }

        .playlist-item:hover {
            background: rgba(0, 0, 0, 0.3);
        }

        .playlist-thumb {
            width: 120px;
            height: 68px;
            object-fit: cover;
            border-radius: 8px;
        }

        .playlist-item-info {
            flex: 1;
        }

        .playlist-item-title {
            font-weight: 600;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            font-size: 0.95rem;
        }

        .playlist-item-duration {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 768px) {
            .logo { font-size: 2rem; }
            .logo-icon { width: 45px; height: 45px; font-size: 1.5rem; }
            .main-card { padding: 25px; }
            .video-header { flex-direction: column; }
            .thumbnail { width: 100%; height: auto; }
            .format-grid { grid-template-columns: repeat(2, 1fr); }
            .action-buttons { flex-direction: column; }
            .progress-stats { grid-template-columns: 1fr; }
        }

        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-dark);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="floating-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">▶</div>
                TubeFlow Pro
            </div>
            <p class="subtitle">Загружайте видео и аудио с YouTube в высоком качестве</p>
        </header>

        <div class="main-card">
            <div class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        class="url-input" 
                        id="urlInput" 
                        placeholder="Вставьте ссылку на YouTube видео или плейлист..."
                        autocomplete="off"
                    >
                    <button class="btn btn-primary" id="analyzeBtn" onclick="analyzeVideo()">
                        <span id="analyzeText">Анализировать</span>
                    </button>
                </div>
                
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('video', this)">📹 Видео</button>
                    <button class="tab" onclick="switchTab('audio', this)">🎵 Только аудио</button>
                </div>
            </div>

            <div class="error-message" id="errorMessage">
                <span>⚠️</span>
                <span id="errorText"></span>
            </div>

            <div class="playlist-info" id="playlistInfo">
                <div class="playlist-header">
                    <div class="playlist-title" id="playlistTitle">Плейлист</div>
                    <div class="playlist-count" id="playlistCount">0 видео</div>
                </div>
                <div class="playlist-videos" id="playlistVideos"></div>
                <div class="action-buttons" style="margin-top: 20px;">
                    <button class="btn btn-primary btn-full" onclick="downloadPlaylist()">
                        <span>⬇️ Загрузить все (MP3)</span>
                    </button>
                </div>
            </div>

            <div class="video-info" id="videoInfo">
                <div class="video-header">
                    <div class="thumbnail-container">
                        <img class="thumbnail" id="thumbnail" src="" alt="">
                        <div class="duration-badge" id="durationBadge">00:00</div>
                    </div>
                    <div class="video-details">
                        <h2 class="video-title" id="videoTitle"></h2>
                        <div class="video-meta">
                            <span id="videoAuthor">👤 --</span>
                            <span id="videoViews">👁 --</span>
                            <span id="videoDate">📅 --</span>
                            <span id="videoLikes">❤️ --</span>
                        </div>
                        <p class="video-description" id="videoDescription"></p>
                    </div>
                </div>

                <div class="format-section" id="videoFormats">
                    <div class="section-title">🎬 Качество видео</div>
                    <div class="format-grid" id="videoFormatGrid"></div>
                </div>

                <div class="format-section hidden" id="audioFormats">
                    <div class="section-title">🎧 Качество аудио</div>
                    <div class="format-grid" id="audioFormatGrid"></div>
                </div>

                <div class="action-buttons">
                    <button class="btn btn-primary btn-full" id="downloadBtn" onclick="startDownload()">
                        <span id="downloadBtnText">⬇️ Загрузить</span>
                    </button>
                    <button class="btn btn-secondary" onclick="resetForm()">
                        <span>🔄 Новая загрузка</span>
                    </button>
                </div>
            </div>

            <div class="download-progress" id="downloadProgress">
                <div class="progress-header">
                    <div class="progress-title">
                        <span class="spinner" style="display: inline-block;"></span>
                        <span id="progressStatus">Загрузка...</span>
                    </div>
                    <div class="progress-percent" id="progressPercent">0%</div>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <div class="progress-stats">
                    <div class="stat-item">
                        <div class="stat-label">Скачано</div>
                        <div class="stat-value" id="statDownloaded">0 MB</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Скорость</div>
                        <div class="stat-value" id="statSpeed">0 MB/s</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">Осталось</div>
                        <div class="stat-value" id="statEta">--:--</div>
                    </div>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <button class="btn btn-secondary" onclick="cancelDownload()" id="cancelBtn">
                        <span>❌ Отменить</span>
                    </button>
                </div>
            </div>

            <div class="success-card" id="successCard">
                <div class="success-icon">✓</div>
                <h2 class="success-title">Готово!</h2>
                <p class="success-filename" id="successFilename"></p>
                <button class="btn btn-success" onclick="downloadFile()">
                    <span>⬇️ Скачать файл</span>
                </button>
                <div style="margin-top: 15px;">
                    <button class="btn btn-secondary" onclick="resetForm()">
                        <span>🔄 Загрузить другое</span>
                    </button>
                </div>
            </div>

            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📥</div>
                <p>Вставьте ссылку на YouTube, чтобы начать</p>
            </div>
        </div>
    </div>

    <script>
        let currentDownloadId = null;
        let selectedFormat = null;
        let currentVideoUrl = null;
        let currentVideoInfo = null;
        let activeTab = 'video';
        let isPlaylist = false;
        let playlistData = null;

        function switchTab(type, btn) {
            activeTab = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            
            if (currentVideoInfo) {
                if (type === 'audio') {
                    document.getElementById('videoFormats').classList.add('hidden');
                    document.getElementById('audioFormats').classList.remove('hidden');
                    const audioBtns = document.querySelectorAll('#audioFormatGrid .format-btn');
                    if (audioBtns.length > 0) selectFormat(audioBtns[0], audioBtns[0].dataset.format);
                } else {
                    document.getElementById('videoFormats').classList.remove('hidden');
                    document.getElementById('audioFormats').classList.add('hidden');
                    const videoBtns = document.querySelectorAll('#videoFormatGrid .format-btn');
                    if (videoBtns.length > 0) selectFormat(videoBtns[0], videoBtns[0].dataset.format);
                }
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            document.getElementById('errorText').textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('show');
        }

        async function analyzeVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const btn = document.getElementById('analyzeBtn');
            const btnText = document.getElementById('analyzeText');
            
            if (!url) {
                showError('Введите ссылку на видео');
                return;
            }

            hideError();
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner" style="width: 16px; height: 16px; border-width: 2px; display: inline-block; vertical-align: middle; margin-right: 8px;"></span> Анализ...';
            
            try {
                const response = await fetch('/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);
                
                currentVideoUrl = url;
                currentVideoInfo = data;
                
                if (data.type === 'playlist') {
                    isPlaylist = true;
                    playlistData = data;
                    showPlaylist(data);
                } else {
                    isPlaylist = false;
                    showVideoInfo(data);
                }
                
                document.getElementById('emptyState').style.display = 'none';
                
            } catch (error) {
                showError(error.message);
                document.getElementById('emptyState').style.display = 'block';
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Анализировать';
            }
        }

        function showPlaylist(data) {
            document.getElementById('playlistInfo').classList.add('show');
            document.getElementById('videoInfo').classList.remove('show');
            document.getElementById('playlistTitle').textContent = data.title;
            document.getElementById('playlistCount').textContent = `${data.count} видео`;
            
            const container = document.getElementById('playlistVideos');
            container.innerHTML = data.videos.map((video, index) => `
                <div class="playlist-item">
                    <img class="playlist-thumb" src="${video.thumbnail}" alt="">
                    <div class="playlist-item-info">
                        <div class="playlist-item-title">${index + 1}. ${video.title}</div>
                        <div class="playlist-item-duration">⏱ ${video.duration_str} • ${video.uploader}</div>
                    </div>
                </div>
            `).join('');
        }

        function showVideoInfo(data) {
            document.getElementById('playlistInfo').classList.remove('show');
            document.getElementById('videoInfo').classList.add('show');
            
            document.getElementById('thumbnail').src = data.thumbnail;
            document.getElementById('durationBadge').textContent = data.duration_str;
            document.getElementById('videoTitle').textContent = data.title;
            document.getElementById('videoAuthor').textContent = '👤 ' + data.uploader;
            document.getElementById('videoViews').textContent = '👁 ' + formatNumber(data.view_count);
            document.getElementById('videoDate').textContent = '📅 ' + (data.upload_date || '--');
            document.getElementById('videoLikes').textContent = '❤️ ' + formatNumber(data.like_count);
            document.getElementById('videoDescription').textContent = data.description || '';
            
            const videoGrid = document.getElementById('videoFormatGrid');
            videoGrid.innerHTML = data.formats_video.map((f, i) => `
                <button class="format-btn ${i === 0 ? 'selected' : ''}" 
                        data-format="${f.format_id}" 
                        onclick="selectFormat(this, '${f.format_id}')">
                    <span class="format-quality">${f.quality}</span>
                    <span class="format-info">${f.ext.toUpperCase()}</span>
                    <span class="format-size">${f.filesize_str}</span>
                </button>
            `).join('');
            
            if (data.formats_video.length > 0) selectedFormat = data.formats_video[0].format_id;
            
            const audioGrid = document.getElementById('audioFormatGrid');
            audioGrid.innerHTML = data.formats_audio.map((f, i) => `
                <button class="format-btn ${i === 0 ? 'selected' : ''}" 
                        data-format="${f.format_id}" 
                        onclick="selectFormat(this, '${f.format_id}')">
                    <span class="format-quality">${f.quality}</span>
                    <span class="format-info">MP3</span>
                    <span class="format-size">${f.filesize_str}</span>
                </button>
            `).join('');
            
            if (activeTab === 'audio') {
                document.getElementById('videoFormats').classList.add('hidden');
                document.getElementById('audioFormats').classList.remove('hidden');
                if (data.formats_audio.length > 0) selectedFormat = data.formats_audio[0].format_id;
            }
        }

        function selectFormat(btn, formatId) {
            const container = btn.closest('.format-grid');
            container.querySelectorAll('.format-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedFormat = formatId;
        }

        async function startDownload() {
            if (!currentVideoUrl || !selectedFormat) return;
            
            const btn = document.getElementById('downloadBtn');
            const btnText = document.getElementById('downloadBtnText');
            
            btn.disabled = true;
            btnText.innerHTML = '<span class="spinner" style="width: 16px; height: 16px; border-width: 2px; display: inline-block; vertical-align: middle; margin-right: 8px;"></span> Подготовка...';
            
            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: currentVideoUrl,
                        format_id: selectedFormat,
                        type: activeTab
                    })
                });
                
                const data = await response.json();
                
                currentDownloadId = data.download_id;
                
                document.getElementById('videoInfo').classList.remove('show');
                document.getElementById('downloadProgress').classList.add('show');
                
                pollProgress();
                
            } catch (error) {
                showError('Ошибка начала загрузки: ' + error.message);
                btn.disabled = false;
                btnText.textContent = '⬇️ Загрузить';
            }
        }

        async function downloadPlaylist() {
            showError('Функция загрузки плейлиста в разработке. Загрузите видео по одному.');
        }

        async function pollProgress() {
            if (!currentDownloadId) return;
            
            try {
                const response = await fetch(`/api/progress/${currentDownloadId}`);
                const data = await response.json();
                
                updateProgressUI(data);
                
                if (data.status === 'downloading' || data.status === 'processing' || data.status === 'starting') {
                    setTimeout(pollProgress, 500);
                } else if (data.status === 'completed') {
                    showSuccess(data);
                } else if (data.status === 'error') {
                    showError('Ошибка загрузки: ' + data.error);
                    resetForm();
                } else if (data.status === 'cancelled') {
                    resetForm();
                }
                
            } catch (error) {
                console.error('Progress error:', error);
                setTimeout(pollProgress, 1000);
            }
        }

        function updateProgressUI(data) {
            const percent = data.percent || 0;
            document.getElementById('progressPercent').textContent = percent + '%';
            document.getElementById('progressBar').style.width = percent + '%';
            document.getElementById('statDownloaded').textContent = data.downloaded || '0 B';
            document.getElementById('statSpeed').textContent = data.speed || '0 B/s';
            document.getElementById('statEta').textContent = data.eta || '--:--';
            
            const statusText = {
                'starting': 'Подготовка...',
                'downloading': 'Загрузка...',
                'processing': 'Обработка...'
            };
            document.getElementById('progressStatus').textContent = statusText[data.status] || data.status;
        }

        function showSuccess(data) {
            document.getElementById('downloadProgress').classList.remove('show');
            document.getElementById('successCard').classList.add('show');
            document.getElementById('successFilename').textContent = data.filename + ' (' + data.file_size + ')';
        }

        function downloadFile() {
            if (currentDownloadId) {
                window.location.href = `/api/download/file/${currentDownloadId}`;
                setTimeout(resetForm, 2000);
            }
        }

        function cancelDownload() {
            if (currentDownloadId) {
                fetch(`/api/cancel/${currentDownloadId}`, { method: 'POST' });
                document.getElementById('cancelBtn').textContent = 'Отмена...';
            }
        }

        function resetForm() {
            currentDownloadId = null;
            selectedFormat = null;
            currentVideoUrl = null;
            currentVideoInfo = null;
            isPlaylist = false;
            playlistData = null;
            
            document.getElementById('urlInput').value = '';
            document.getElementById('videoInfo').classList.remove('show');
            document.getElementById('playlistInfo').classList.remove('show');
            document.getElementById('downloadProgress').classList.remove('show');
            document.getElementById('successCard').classList.remove('show');
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('downloadBtn').disabled = false;
            document.getElementById('downloadBtnText').textContent = '⬇️ Загрузить';
            document.getElementById('cancelBtn').innerHTML = '<span>❌ Отменить</span>';
            
            activeTab = 'video';
            document.querySelectorAll('.tab').forEach((t, i) => {
                t.classList.toggle('active', i === 0);
            });
            document.getElementById('videoFormats').classList.remove('hidden');
            document.getElementById('audioFormats').classList.add('hidden');
        }

        function formatNumber(num) {
            if (!num) return '--';
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toString();
        }

        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') analyzeVideo();
        });
    </script>
</body>
</html>
