<!-- docker-compose.prod.yml -->
version: '3.8'

services:
  tubeflow:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: tubeflow_pro
    restart: unless-stopped
    ports:
      - "5001:5001"
    volumes:
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./cache:/app/cache
    environment:
      - FLASK_ENV=production
      - DEBUG=False
      - WORKERS=4
      - THREADS=8
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: tubeflow_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - tubeflow